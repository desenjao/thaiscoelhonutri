<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💝 Criar Presente - Nutri do Casal</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            min-height: 100vh;
        }

        .font-playfair {
            font-family: 'Playfair Display', serif;
        }

        .quiz-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.02);
            border: 1px solid #f1f1f1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            border-radius: 48px;
            transition: all 0.3s ease;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(236, 72, 153, 0.2);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(236, 72, 153, 0.3);
        }

        .btn-secondary {
            background: #f3f4f6;
            border-radius: 48px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: #4b5563;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }

        .choice-card {
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9fafb;
            border: 1.5px solid #f0f0f0;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .choice-card:hover {
            background: #fdf2f8;
            border-color: #fbcfe8;
            transform: translateX(3px);
        }

        .choice-card.selected {
            background: #fce7f3;
            border-color: #ec4899;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.12);
        }

        .choice-radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .choice-card.selected .choice-radio {
            border-color: #ec4899;
            background: #ec4899;
            box-shadow: inset 0 0 0 3px white;
        }

        .step-indicator {
            width: 44px;
            height: 44px;
            border-radius: 60px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #6b7280;
            transition: all 0.25s;
        }

        .step-indicator.active {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            box-shadow: 0 6px 14px rgba(236, 72, 153, 0.35);
        }

        .step-indicator.completed {
            background: #10b981;
            color: white;
        }

        .modern-input,
        .modern-textarea {
            background: #f9fafb;
            border: 1.5px solid #f0f0f0;
            transition: all 0.2s ease;
            border-radius: 20px;
            width: 100%;
            padding: 14px 18px;
            font-size: 0.95rem;
        }

        .modern-input:focus,
        .modern-textarea:focus {
            border-color: #f472b6;
            background: white;
            box-shadow: 0 0 0 3px rgba(244, 114, 182, 0.15);
            outline: none;
        }

        .preview-card {
            background: linear-gradient(135deg, #fff5f9, #ffffff);
            border-left: 5px solid #ec4899;
            border-radius: 24px;
            padding: 22px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.02);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .step {
            display: none;
            animation: fadeInUp 0.35s ease-out;
        }

        .step.active {
            display: block;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body class="bg-white">
    <div id="app" class="relative z-10 py-8 px-4 md:px-6 max-w-3xl mx-auto"></div>

    <script>
        // ========== MULTIPLA ESCOLHA + DADOS ==========
        let currentStep = 1;
        let submitting = false;

        let formData = {
            nome: "", telefone: "", email: "", mensagem: "",
            anamnese: {
                objetivo: "",
                restricoes: [],
                comidaFavorita: "",
                doceFavorito: "",
                nivelAtividade: ""
            },
            relacionamento: {
                tempoJuntos: "",
                dataInicio: "",
                maiorSabotagemAlimentar: "",
                musicaDoCasal: ""
            }
        };

        const objetivoOptions = ["💪 Hipertrofia", "🔥 Emagrecimento", "✨ Definição muscular", "🍃 Saúde & Bem-estar", "⚡ Performance atlética"];
        const atividadeOptions = ["🛋️ Baixo (1-2x/semana)", "🚶 Moderado (3-4x/semana)", "🏃 Alto (5x+/semana)", "🏆 Atleta / Treino diário"];
        const restricoesOptions = ["🥛 Lactose", "🌾 Glúten", "🥜 Castanhas/Amendoim", "🍤 Frutos do mar", "🌱 Vegano", "🥚 Ovo", "Sem restrições"];
        const tempoOptions = ["⏳ Menos de 1 ano", "💕 1 a 2 anos", "🌟 3 a 5 anos", "🏡 Mais de 5 anos", "💍 Casados há mais tempo"];
        const sabotagemOptions = [
            "🍔 Fast food (hambúrguer/pizza)",
            "🍫 Doce noturno (chocolate/sorvete)",
            "🍿 Finais de semana sem regras",
            "🍺 Bebidas alcoólicas com frequência",
            "🥡 Comer assistindo série (mindless eating)"
        ];
        const musicaOptions = [
            "🎸 Rock romântico (Ex: Yellow - Coldplay)",
            "🎤 Sertanejo universitário",
            "🎧 Pop / MPB atual",
            "💃 Pagode / Samba",
            "🎵 Eletrônica / Indie",
            "❤️ Nossa playlist pessoal (escreva abaixo)"
        ];

        function formatPhone(value) {
            const numbers = value.replace(/\D/g, '');
            if (numbers.length <= 11) return numbers.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            return value;
        }

        function showStep(step) {
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById(`step-${i}`);
                if (el) el.classList.toggle('active', i === step);
            }
            updateStepUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function updateStepUI() {
            for (let i = 1; i <= 4; i++) {
                const indicator = document.getElementById(`step-indicator-${i}`);
                if (indicator) {
                    if (i < currentStep) indicator.className = "step-indicator completed mx-auto";
                    else if (i === currentStep) indicator.className = "step-indicator active mx-auto";
                    else indicator.className = "step-indicator mx-auto";
                }
            }
            const progress = ((currentStep - 1) / 3) * 100;
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) progressBar.style.width = `${progress}%`;

            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                if (currentStep === 4) {
                    nextBtn.innerHTML = '<i class="fas fa-gift mr-2"></i>Criar Presente →';
                } else {
                    nextBtn.innerHTML = 'Próximo →';
                }
            }
        }

        function validateStep(step) {
            if (step === 1) {
                if (!formData.nome.trim()) { Swal.fire('💕 Atenção', 'Digite seu nome completo', 'warning'); return false; }
                const phoneDigits = (formData.telefone || '').replace(/\D/g, '');
                if (phoneDigits.length < 10) { Swal.fire('💕 Atenção', 'Digite um WhatsApp válido com DDD', 'warning'); return false; }
                if (!formData.email || !formData.email.includes('@')) { Swal.fire('💕 Atenção', 'Digite um e-mail válido', 'warning'); return false; }
                if (!formData.mensagem.trim()) { Swal.fire('💕 Atenção', 'Escreva uma mensagem especial para seu amor ❤️', 'warning'); return false; }
                return true;
            }
            if (step === 2) {
                if (!formData.anamnese.objetivo) { Swal.fire('🍎 Atenção', 'Selecione o objetivo principal', 'warning'); return false; }
                if (!formData.anamnese.comidaFavorita) { Swal.fire('🍎 Atenção', 'Informe a comida favorita', 'warning'); return false; }
                if (!formData.anamnese.doceFavorito) { Swal.fire('🍎 Atenção', 'Informe o doce favorito', 'warning'); return false; }
                if (!formData.anamnese.nivelAtividade) { Swal.fire('🍎 Atenção', 'Selecione o nível de atividade', 'warning'); return false; }
                return true;
            }
            if (step === 3) {
                if (!formData.relacionamento.tempoJuntos) { Swal.fire('💑 Atenção', 'Selecione há quanto tempo estão juntos', 'warning'); return false; }
                if (!formData.relacionamento.maiorSabotagemAlimentar) { Swal.fire('💑 Atenção', 'Selecione a maior sabotagem alimentar', 'warning'); return false; }
                if (!formData.relacionamento.musicaDoCasal) { Swal.fire('💑 Atenção', 'Selecione ou escreva a música do casal', 'warning'); return false; }
                return true;
            }
            return true;
        }

        function nextStep() {
            if (!validateStep(currentStep)) return;
            if (currentStep < 4) {
                currentStep++;
                showStep(currentStep);
            } else {
                submitForm();
            }
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
            }
        }

        async function submitForm() {
            if (submitting) return;
            submitting = true;
            const submitBtn = document.getElementById('next-btn');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Enviando...';
            }

            try {
                const payload = {
                    ...formData,
                    tipoUsuario: "COMPRADOR",
                    anamnese: {
                        ...formData.anamnese,
                        restricoes: formData.anamnese.restricoes.length ? formData.anamnese.restricoes : ["Nenhuma"]
                    }
                };

                const response = await fetch('https://thaicnutriback.onrender.com/api/namorados/quiz', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // 🔥 Link correto apontando para presente-recebido.html
                    const link = `${window.location.origin}/presente-recebido.html?casalId=${result.casalId}`;

                    Swal.fire({
                        title: '💝 Presente personalizado criado!',
                        html: `<div class="text-center">
                                <p class="mb-3 text-gray-700">Seu presente está pronto! ✨ Compartilhe com seu amor:</p>
                                <div class="bg-pink-50 p-3 rounded-xl border border-pink-200">
                                    <input type="text" id="linkPresente" value="${link}" class="w-full p-2 bg-white text-pink-700 rounded-lg text-center font-mono text-sm border border-pink-200" readonly>
                                </div>
                                <button id="copiarLink" class="btn-primary px-6 py-2 rounded-full text-white mt-4" style="background: linear-gradient(135deg, #f472b6, #ec4899); border: none;">📋 Copiar Link</button>
                                <p class="text-xs text-gray-400 mt-3">⚠️ Importante: Quando seu amor acessar esse link, ele/ela vai ver sua mensagem e depois responder o quiz!</p>
                               </div>`,
                        icon: 'success',
                        background: '#ffffff',
                        color: '#1f2937',
                        showConfirmButton: true,
                        confirmButtonText: 'Fechar',
                        confirmButtonColor: '#ec4899',
                        didOpen: () => {
                            const copyBtn = document.getElementById('copiarLink');
                            if (copyBtn) {
                                copyBtn.onclick = () => {
                                    navigator.clipboard.writeText(link);
                                    Swal.fire('Copiado!', 'Envie para seu amor via WhatsApp 💕', 'success');
                                };
                            }
                        }
                    });
                } else {
                    throw new Error(result.message || 'Falha ao criar presente');
                }
            } catch (error) {
                Swal.fire('😢 Ops!', 'Não foi possível criar o presente. Tente novamente mais tarde.', 'error');
            } finally {
                submitting = false;
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<i class="fas fa-gift mr-2"></i>Criar Presente →';
                }
            }
        }

        window.setObjetivo = (value) => {
            formData.anamnese.objetivo = value;
            updateChoiceSelection('.obj-choice', value);
            updatePreview();
        };
        window.setAtividade = (value) => {
            formData.anamnese.nivelAtividade = value;
            updateChoiceSelection('.atv-choice', value);
            updatePreview();
        };
        window.setTempoJuntos = (value) => {
            formData.relacionamento.tempoJuntos = value;
            updateChoiceSelection('.tempo-choice', value);
            updatePreview();
        };
        window.setSabotagem = (value) => {
            formData.relacionamento.maiorSabotagemAlimentar = value;
            updateChoiceSelection('.sabotagem-choice', value);
            updatePreview();
        };
        window.setMusicaPreset = (value) => {
            if (value === "❤️ Nossa playlist pessoal (escreva abaixo)") {
                formData.relacionamento.musicaDoCasal = "";
                document.getElementById('musica-custom-container')?.classList.remove('hidden');
                const customInput = document.getElementById('musica-custom-input');
                if (customInput) customInput.value = "";
            } else {
                formData.relacionamento.musicaDoCasal = value;
                document.getElementById('musica-custom-container')?.classList.add('hidden');
            }
            updateChoiceSelection('.musica-choice', value);
            updatePreview();
        };
        window.updateMusicaCustom = (customValue) => {
            if (customValue.trim()) {
                formData.relacionamento.musicaDoCasal = customValue.trim();
            } else {
                const presetSelected = document.querySelector('.musica-choice.selected');
                if (presetSelected && presetSelected.getAttribute('data-value') !== "❤️ Nossa playlist pessoal (escreva abaixo)") {
                    formData.relacionamento.musicaDoCasal = presetSelected.getAttribute('data-value');
                } else {
                    formData.relacionamento.musicaDoCasal = "";
                }
            }
            updatePreview();
        };

        window.toggleRestricao = (value, element) => {
            let current = [...formData.anamnese.restricoes];
            if (current.includes(value)) {
                current = current.filter(r => r !== value);
                element.classList.remove('selected');
            } else {
                current.push(value);
                element.classList.add('selected');
            }
            formData.anamnese.restricoes = current;
            updatePreview();
        };

        function updateChoiceSelection(selector, selectedValue) {
            document.querySelectorAll(selector).forEach(el => {
                if (el.getAttribute('data-value') === selectedValue) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }

        function updatePreview() {
            const preview = document.getElementById('preview-content');
            if (!preview) return;
            const restricoesText = formData.anamnese.restricoes.length ? formData.anamnese.restricoes.join(', ') : 'Nenhuma';
            preview.innerHTML = `
                <p class="font-bold text-gray-800 text-lg">✨ ${formData.nome || 'Seu nome'}</p>
                <p class="text-gray-500 text-sm">📞 ${formData.telefone || ''} | ✉️ ${formData.email || ''}</p>
                <p class="text-pink-600 italic text-sm mt-2 bg-pink-50 p-2 rounded-xl">💌 "${formData.mensagem || 'Sua mensagem especial'}"</p>
                <div class="border-t border-gray-100 my-3"></div>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🎯 Objetivo:</span> ${formData.anamnese.objetivo || '-'}</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🍽️ Comida favorita:</span> ${formData.anamnese.comidaFavorita || '-'}</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🍰 Doce favorito:</span> ${formData.anamnese.doceFavorito || '-'}</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">💪 Atividade:</span> ${formData.anamnese.nivelAtividade || '-'}</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🚫 Restrições:</span> ${restricoesText}</p>
                <div class="border-t border-gray-100 my-3"></div>
                <p class="text-gray-700 text-sm"><span class="font-semibold">⏰ Tempo juntos:</span> ${formData.relacionamento.tempoJuntos || '-'}</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🍔 Sabotagem:</span> "${formData.relacionamento.maiorSabotagemAlimentar || '-'}"</p>
                <p class="text-gray-700 text-sm"><span class="font-semibold">🎵 Música do casal:</span> ${formData.relacionamento.musicaDoCasal || '-'}</p>
            `;
        }

        function render() {
            const html = `
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between mb-6 mt-2">
                        ${[1, 2, 3, 4].map(s => `
                            <div class="flex-1 text-center">
                                <div id="step-indicator-${s}" class="step-indicator mx-auto">${s}</div>
                                <p class="text-gray-500 text-xs mt-2 font-medium">${['Você', 'Saúde', 'Nós', 'Revisão'][s - 1]}</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="relative mb-8">
                        <div class="h-2 bg-gray-100 rounded-full w-full"></div>
                        <div id="progress-bar" class="absolute top-0 h-2 bg-gradient-to-r from-pink-400 to-rose-500 rounded-full transition-all duration-500" style="width:0%"></div>
                    </div>
                    
                    <div class="quiz-card p-6 md:p-8">
                        <div id="step-1" class="step space-y-5">
                            <div class="text-center mb-2"><i class="fas fa-heart text-4xl text-pink-400"></i><h2 class="text-2xl font-playfair font-bold text-gray-800 mt-2">Quem está surpreendendo?</h2><p class="text-gray-500">Vamos preparar um presente único 💘</p></div>
                            <div><label class="block text-gray-700 font-semibold mb-2">Seu nome completo *</label><input id="input-nome" type="text" class="modern-input" placeholder="Ex: Ana Clara"></div>
                            <div><label class="block text-gray-700 font-semibold mb-2">WhatsApp (com DDD) *</label><input id="input-telefone" type="tel" class="modern-input" placeholder="(11) 99999-9999"></div>
                            <div><label class="block text-gray-700 font-semibold mb-2">E-mail *</label><input id="input-email" type="email" class="modern-input" placeholder="voce@email.com"></div>
                            <div><label class="block text-gray-700 font-semibold mb-2">Mensagem para seu amor *</label><textarea id="input-mensagem" rows="4" class="modern-textarea" placeholder="Escreva algo que vai fazer o coração dela(e) disparar... 💌"></textarea></div>
                        </div>
                        
                        <div id="step-2" class="step space-y-6">
                            <div class="text-center"><i class="fas fa-apple-alt text-4xl text-pink-400"></i><h2 class="text-xl font-playfair font-bold text-gray-800">Hábitos & metas</h2></div>
                            <div><span class="font-semibold text-gray-700">🎯 Objetivo principal *</span><div class="mt-2 space-y-2">${objetivoOptions.map(opt => `<div class="choice-card obj-choice" data-value="${opt}" onclick="setObjetivo('${opt}')"><div class="choice-radio"></div><span class="text-gray-800">${opt}</span></div>`).join('')}</div></div>
                            <div><label class="block font-semibold text-gray-700">🍽️ Comida favorita *</label><input id="input-comida" class="modern-input mt-1" placeholder="Ex: Strogonoff, Pizza, Comida japonesa..."></div>
                            <div><label class="block font-semibold text-gray-700">🍰 Doce favorito *</label><input id="input-doce" class="modern-input mt-1" placeholder="Ex: Brownie, Pudim, Brigadeiro..."></div>
                            <div><span class="font-semibold text-gray-700">💪 Nível de atividade física *</span><div class="mt-2 space-y-2">${atividadeOptions.map(opt => `<div class="choice-card atv-choice" data-value="${opt}" onclick="setAtividade('${opt}')"><div class="choice-radio"></div><span class="text-gray-800">${opt}</span></div>`).join('')}</div></div>
                            <div><span class="font-semibold text-gray-700">🚫 Restrições alimentares (várias opções)</span><div class="grid grid-cols-2 gap-2 mt-2">${restricoesOptions.map(r => `<div class="choice-card text-sm p-2" data-value="${r}" onclick="toggleRestricao('${r}', this)"><div class="choice-radio"></div><span>${r}</span></div>`).join('')}</div></div>
                        </div>
                        
                        <div id="step-3" class="step space-y-6">
                            <div class="text-center"><i class="fas fa-heartbeat text-4xl text-pink-400"></i><h2 class="text-xl font-playfair font-bold text-gray-800">Sobre o amor de vocês</h2></div>
                            <div><span class="font-semibold text-gray-700">⏳ Há quanto tempo estão juntos? *</span><div class="mt-2 space-y-2">${tempoOptions.map(opt => `<div class="choice-card tempo-choice" data-value="${opt}" onclick="setTempoJuntos('${opt}')"><div class="choice-radio"></div><span>${opt}</span></div>`).join('')}</div></div>
                            <div><label class="block font-semibold text-gray-700">📅 Data de início (opcional)</label><input id="input-data" class="modern-input mt-1" placeholder="DD/MM/AAAA"></div>
                            <div><span class="font-semibold text-gray-700">🍔 Maior sabotagem alimentar do casal *</span><div class="mt-2 space-y-2">${sabotagemOptions.map(opt => `<div class="choice-card sabotagem-choice" data-value="${opt}" onclick="setSabotagem('${opt}')"><div class="choice-radio"></div><span>${opt}</span></div>`).join('')}</div></div>
                            <div><span class="font-semibold text-gray-700">🎵 Música do casal *</span><div class="mt-2 space-y-2">${musicaOptions.map(opt => `<div class="choice-card musica-choice" data-value="${opt}" onclick="setMusicaPreset('${opt}')"><div class="choice-radio"></div><span>${opt}</span></div>`).join('')}</div></div>
                            <div id="musica-custom-container" class="hidden"><label class="font-semibold text-gray-700">Escreva sua música especial:</label><input id="musica-custom-input" class="modern-input mt-1" placeholder="Ex: Tudo que você sempre sonhou - Gabriel Elias" oninput="updateMusicaCustom(this.value)"></div>
                        </div>
                        
                        <div id="step-4" class="step space-y-5">
                            <div class="text-center"><i class="fas fa-gift text-4xl text-pink-400"></i><h2 class="text-2xl font-playfair font-bold text-gray-800">Revisão do presente</h2><p class="text-gray-500">Confira e crie o link mágico ✨</p></div>
                            <div id="preview-content" class="preview-card"><p class="text-gray-400 text-center">Preencha os dados acima para ver o resumo</p></div>
                            <div class="bg-pink-50 rounded-2xl p-4 border border-pink-100"><p class="text-pink-700 text-sm text-center"><i class="fas fa-heart mr-2 text-pink-400"></i>Após criar, envie o link para seu amor! Ele/ela vai ver sua mensagem e depois responder o quiz <i class="fas fa-heart ml-2 text-pink-400"></i></p></div>
                        </div>
                        
                        <div class="flex gap-4 mt-8 pt-6 border-t border-gray-100">
                            <button id="prev-btn" class="btn-secondary flex-1 py-3 rounded-full font-semibold"><i class="fas fa-arrow-left mr-2"></i>Voltar</button>
                            <button id="next-btn" class="btn-primary flex-1 py-3 rounded-full text-white font-semibold text-lg shadow-md">Próximo →</button>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('app').innerHTML = html;

            document.getElementById('prev-btn').onclick = prevStep;
            document.getElementById('next-btn').onclick = nextStep;

            document.getElementById('input-nome')?.addEventListener('input', (e) => { formData.nome = e.target.value; updatePreview(); });
            const telInput = document.getElementById('input-telefone');
            if (telInput) telInput.addEventListener('input', (e) => { e.target.value = formatPhone(e.target.value); formData.telefone = e.target.value; updatePreview(); });
            document.getElementById('input-email')?.addEventListener('input', (e) => { formData.email = e.target.value; updatePreview(); });
            document.getElementById('input-mensagem')?.addEventListener('input', (e) => { formData.mensagem = e.target.value; updatePreview(); });
            document.getElementById('input-comida')?.addEventListener('input', (e) => { formData.anamnese.comidaFavorita = e.target.value; updatePreview(); });
            document.getElementById('input-doce')?.addEventListener('input', (e) => { formData.anamnese.doceFavorito = e.target.value; updatePreview(); });
            document.getElementById('input-data')?.addEventListener('input', (e) => { formData.relacionamento.dataInicio = e.target.value; });
            const customMusica = document.getElementById('musica-custom-input');
            if (customMusica) customMusica.addEventListener('input', (e) => updateMusicaCustom(e.target.value));

            showStep(1);
            updatePreview();
        }

        render();
    </script>
</body>

</html>
