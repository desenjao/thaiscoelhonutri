<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>💝 Você ganhou um presente especial! - Nutri do Casal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #fff0f5 0%, #ffe4ed 100%);
            min-height: 100vh;
        }
        .font-playfair { font-family: 'Playfair Display', serif; }
        
        .hero-card {
            background: rgba(255,255,255,0.98);
            border-radius: 64px;
            box-shadow: 0 25px 50px -12px rgba(236,72,153,0.3);
            transition: all 0.3s ease;
        }
        
        .mensagem-card {
            background: linear-gradient(135deg, #fef2f8, #fff5f9);
            border-left: 6px solid #ec4899;
            border-radius: 32px;
        }
        
        .btn-responder {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            border-radius: 60px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(236,72,153,0.4);
        }
        .btn-responder:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 35px rgba(236,72,153,0.5);
        }
        
        .btn-secondary {
            background: #f3f4f6;
            border-radius: 48px;
            transition: all 0.3s ease;
            cursor: pointer;
            color: #4b5563;
        }
        .btn-secondary:hover {
            background: #e5e7eb;
            transform: translateY(-1px);
        }
        
        .step-bubble {
            width: 56px;
            height: 56px;
            background: #fce7f3;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        .feature-card {
            background: white;
            border-radius: 28px;
            padding: 20px;
            transition: all 0.3s;
            border: 1px solid #ffe0ed;
        }
        .feature-card:hover {
            transform: translateY(-5px);
            border-color: #f472b6;
            box-shadow: 0 12px 24px rgba(236,72,153,0.12);
        }
        
        .choice-card {
            cursor: pointer;
            transition: all 0.2s ease;
            background: #f9fafb;
            border: 1.5px solid #f0f0f0;
            border-radius: 20px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .choice-card:hover {
            background: #fdf2f8;
            border-color: #fbcfe8;
            transform: translateX(3px);
        }
        .choice-card.selected {
            background: #fce7f3;
            border-color: #ec4899;
            box-shadow: 0 4px 12px rgba(236,72,153,0.12);
        }
        .choice-radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #d1d5db;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .choice-card.selected .choice-radio {
            border-color: #ec4899;
            background: #ec4899;
            box-shadow: inset 0 0 0 3px white;
        }
        
        .modern-input, .modern-textarea {
            background: #f9fafb;
            border: 1.5px solid #f0f0f0;
            transition: all 0.2s ease;
            border-radius: 20px;
            width: 100%;
            padding: 14px 18px;
            font-size: 0.95rem;
        }
        .modern-input:focus, .modern-textarea:focus {
            border-color: #f472b6;
            background: white;
            box-shadow: 0 0 0 3px rgba(244,114,182,0.15);
            outline: none;
        }
        
        .step {
            display: none;
            animation: fadeInUp 0.35s ease-out;
        }
        .step.active {
            display: block;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .step-indicator {
            width: 44px;
            height: 44px;
            border-radius: 60px;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: #6b7280;
            transition: all 0.25s;
        }
        .step-indicator.active {
            background: linear-gradient(135deg, #f472b6, #ec4899);
            color: white;
            box-shadow: 0 6px 14px rgba(236,72,153,0.35);
        }
        .step-indicator.completed {
            background: #10b981;
            color: white;
        }
        
        .skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #fafafa 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.2s infinite;
            border-radius: 20px;
        }
        
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .hidden-section {
            display: none;
        }
        
        .fade-out {
            animation: fadeOut 0.5s ease-out forwards;
        }
        
        @keyframes fadeOut {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(-20px); display: none; }
        }
        
        .slide-down {
            animation: slideDown 0.5s ease-out;
        }
        
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="app" class="max-w-4xl mx-auto px-5 py-10 md:py-16"></div>

    <script>
        // ======================= PÁGINA COMPLETA: PRESENTE + FORMULÁRIO DE RESPOSTA =======================
        const API_BASE = 'https://thaicnutriback.onrender.com';
        
        let casalId = null;
        let dadosPresente = null;
        let currentStep = 1;
        let submitting = false;
        
        // Dados que a pessoa que recebeu vai preencher
        let respostaData = {
            nome: "",
            telefone: "",
            email: "",
            mensagemResposta: "",
            objetivo: "",
            restricoes: [],
            comidaFavorita: "",
            doceFavorito: "",
            nivelAtividade: ""
        };
        
        // Opções para múltipla escolha
        const objetivoOptions = ["💪 Hipertrofia", "🔥 Emagrecimento", "✨ Definição muscular", "🍃 Saúde & Bem-estar", "⚡ Performance atlética"];
        const atividadeOptions = ["🛋️ Baixo (1-2x/semana)", "🚶 Moderado (3-4x/semana)", "🏃 Alto (5x+/semana)", "🏆 Atleta / Treino diário"];
        const restricoesOptions = ["🥛 Lactose", "🌾 Glúten", "🥜 Castanhas/Amendoim", "🍤 Frutos do mar", "🌱 Vegano", "🥚 Ovo", "Sem restrições"];
        
        function getCasalIdFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('casalId');
        }
        
        async function carregarDadosPresente(id) {
            try {
                const url = `${API_BASE}/api/namorados/quiz?casalId=${id}`;
                console.log('Buscando dados em:', url);
                
                const response = await fetch(url);
                const result = await response.json();
                
                console.log('Resposta da API:', result);
                
                if (response.ok && result.success && result.data) {
                    return result.data;
                }
                if (response.ok && result.id) {
                    return result;
                }
                return null;
            } catch (error) {
                console.error('Erro ao carregar:', error);
                return null;
            }
        }
        
        function formatarData(dataString) {
            if (!dataString) return '';
            const data = new Date(dataString);
            return data.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        }
        
        function formatPhone(value) {
            const numbers = value.replace(/\D/g, '');
            if (numbers.length <= 11) return numbers.replace(/(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            return value;
        }
        
        // Funções do formulário de resposta
        function showStep(step) {
            for (let i = 1; i <= 4; i++) {
                const el = document.getElementById(`step-${i}`);
                if (el) el.classList.toggle('active', i === step);
            }
            updateStepUI();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function updateStepUI() {
            for (let i = 1; i <= 4; i++) {
                const indicator = document.getElementById(`step-indicator-${i}`);
                if (indicator) {
                    if (i < currentStep) indicator.className = "step-indicator completed mx-auto";
                    else if (i === currentStep) indicator.className = "step-indicator active mx-auto";
                    else indicator.className = "step-indicator mx-auto";
                }
            }
            const progress = ((currentStep - 1) / 3) * 100;
            const progressBar = document.getElementById('progress-bar');
            if (progressBar) progressBar.style.width = `${progress}%`;
            
            const nextBtn = document.getElementById('next-btn');
            if (nextBtn) {
                if (currentStep === 4) {
                    nextBtn.innerHTML = '<i class="fas fa-heart mr-2"></i>Enviar com amor ✨';
                } else {
                    nextBtn.innerHTML = 'Próximo →';
                }
            }
        }
        
        function validateStep(step) {
            if (step === 1) {
                if (!respostaData.nome.trim()) { Swal.fire('💕 Atenção', 'Digite seu nome completo', 'warning'); return false; }
                const phoneDigits = (respostaData.telefone || '').replace(/\D/g, '');
                if (phoneDigits.length < 10) { Swal.fire('💕 Atenção', 'Digite um WhatsApp válido com DDD', 'warning'); return false; }
                if (!respostaData.email || !respostaData.email.includes('@')) { Swal.fire('💕 Atenção', 'Digite um e-mail válido', 'warning'); return false; }
                return true;
            }
            if (step === 2) {
                if (!respostaData.objetivo) { Swal.fire('🍎 Atenção', 'Selecione o objetivo principal', 'warning'); return false; }
                if (!respostaData.comidaFavorita) { Swal.fire('🍎 Atenção', 'Informe a comida favorita', 'warning'); return false; }
                if (!respostaData.doceFavorito) { Swal.fire('🍎 Atenção', 'Informe o doce favorito', 'warning'); return false; }
                if (!respostaData.nivelAtividade) { Swal.fire('🍎 Atenção', 'Selecione o nível de atividade', 'warning'); return false; }
                return true;
            }
            if (step === 3) {
                if (!respostaData.mensagemResposta) { Swal.fire('💌 Meu bem', 'Escreva uma mensagem fofa pra quem te presenteou! 💘', 'warning'); return false; }
                return true;
            }
            return true;
        }
        
        function nextStep() {
            if (!validateStep(currentStep)) return;
            if (currentStep < 4) {
                currentStep++;
                showStep(currentStep);
            } else {
                enviarResposta();
            }
        }
        
        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                showStep(currentStep);
            }
        }
        
        async function enviarResposta() {
            if (submitting) return;
            submitting = true;
            const btn = document.getElementById('next-btn');
            if (btn) {
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse mr-2"></i>Enviando...';
            }
            
            try {
                const payload = {
                    casalId: casalId,
                    respondente: {
                        nome: respostaData.nome,
                        telefone: respostaData.telefone,
                        email: respostaData.email,
                        mensagem: respostaData.mensagemResposta,
                        anamnese: {
                            objetivo: respostaData.objetivo,
                            restricoes: respostaData.restricoes.length ? respostaData.restricoes : ["Nenhuma"],
                            comidaFavorita: respostaData.comidaFavorita,
                            doceFavorito: respostaData.doceFavorito,
                            nivelAtividade: respostaData.nivelAtividade
                        }
                    }
                };
                
                const response = await fetch(`${API_BASE}/api/namorados/responder`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const result = await response.json();
                
                if (response.ok && result.success) {
                    Swal.fire({
                        title: '💖 Resposta enviada com amor!',
                        html: `<div class="text-center">
                                <i class="fas fa-heart text-6xl text-pink-400 mb-3"></i>
                                <p class="text-gray-700">Que lindo! ${dadosPresente?.comprador?.nome || 'Seu amor'} vai receber suas respostas.</p>
                                <p class="text-pink-600 text-sm mt-3">Em breve, um plano especial para o casal vai chegar 💌</p>
                                <div class="bg-pink-50 rounded-2xl p-3 mt-4">
                                    <p class="text-xs text-pink-600">✨ O amor transforma tudo ✨</p>
                                </div>
                               </div>`,
                        icon: 'success',
                        confirmButtonText: '💕 Fechar',
                        confirmButtonColor: '#ec4899'
                    });
                    setTimeout(() => location.reload(), 3000);
                } else {
                    throw new Error(result.message || 'Erro ao enviar resposta');
                }
            } catch (error) {
                Swal.fire('😢 Ops!', 'Não conseguimos enviar sua resposta. Tenta de novo, coração ❤️', 'error');
            } finally {
                submitting = false;
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-heart mr-2"></i>Enviar com amor ✨';
                }
            }
        }
        
        // Handlers globais
        window.setObjetivo = (val) => { 
            respostaData.objetivo = val; 
            updateSelection('.obj-choice', val); 
        };
        window.setAtividade = (val) => { 
            respostaData.nivelAtividade = val; 
            updateSelection('.atv-choice', val); 
        };
        window.toggleRestricao = (val, el) => {
            let arr = [...respostaData.restricoes];
            if (arr.includes(val)) {
                arr = arr.filter(r => r !== val);
                el.classList.remove('selected');
            } else {
                arr.push(val);
                el.classList.add('selected');
            }
            respostaData.restricoes = arr;
        };
        
        function updateSelection(selector, selectedVal) {
            document.querySelectorAll(selector).forEach(el => {
                if (el.getAttribute('data-value') === selectedVal) {
                    el.classList.add('selected');
                } else {
                    el.classList.remove('selected');
                }
            });
        }
        
        // Função para vincular todos os eventos do formulário
        function bindFormEvents() {
            // Inputs
            document.getElementById('resp-nome')?.addEventListener('input', (e) => { respostaData.nome = e.target.value; });
            const telInput = document.getElementById('resp-telefone');
            if(telInput) {
                telInput.addEventListener('input', (e) => { 
                    e.target.value = formatPhone(e.target.value); 
                    respostaData.telefone = e.target.value; 
                });
            }
            document.getElementById('resp-email')?.addEventListener('input', (e) => { respostaData.email = e.target.value; });
            document.getElementById('resp-comida')?.addEventListener('input', (e) => { respostaData.comidaFavorita = e.target.value; });
            document.getElementById('resp-doce')?.addEventListener('input', (e) => { respostaData.doceFavorito = e.target.value; });
            document.getElementById('resp-mensagem')?.addEventListener('input', (e) => { respostaData.mensagemResposta = e.target.value; });
            
            // Botões
            document.getElementById('prev-btn')?.addEventListener('click', prevStep);
            document.getElementById('next-btn')?.addEventListener('click', nextStep);
        }
        
        // Função para esconder a introdução e mostrar o formulário
        function iniciarResposta() {
            const introSection = document.getElementById('intro-section');
            const formSection = document.getElementById('form-section');
            
            if (introSection) {
                introSection.classList.add('fade-out');
                setTimeout(() => {
                    introSection.classList.add('hidden-section');
                    if (formSection) {
                        formSection.classList.remove('hidden-section');
                        formSection.classList.add('slide-down');
                        // Vincular eventos do formulário APÓS ele ser mostrado
                        bindFormEvents();
                        // Reset para o primeiro passo
                        currentStep = 1;
                        showStep(1);
                    }
                }, 500);
            }
            
            // Scroll suave para o formulário
            setTimeout(() => {
                document.getElementById('form-section')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }, 550);
        }
        
        function renderizarFormulario() {
            const nomeRemetente = dadosPresente?.comprador?.nome || dadosPresente?.nome || 'Alguém muito especial';
            
            return `
                <div id="form-section" class="hidden-section">
                    <div class="text-center mb-6">
                        <i class="fas fa-heart text-3xl text-pink-400"></i>
                        <h2 class="font-playfair text-2xl font-bold text-gray-800 mt-2">💝 Agora é a sua vez!</h2>
                        <p class="text-gray-500">Responda com carinho para completarmos esse presente</p>
                    </div>
                    
                    <!-- Progresso -->
                    <div class="flex justify-between mb-6">
                        ${[1,2,3,4].map(s => `<div class="flex-1 text-center"><div id="step-indicator-${s}" class="step-indicator mx-auto">${s}</div><p class="text-xs text-gray-400 mt-1">${['Você','Hábitos','Mensagem','Enviar'][s-1]}</p></div>`).join('')}
                    </div>
                    <div class="relative mb-8">
                        <div class="h-2 bg-gray-100 rounded-full w-full"></div>
                        <div id="progress-bar" class="absolute top-0 h-2 bg-gradient-to-r from-pink-400 to-rose-500 rounded-full transition-all duration-500" style="width:0%"></div>
                    </div>
                    
                    <!-- STEP 1 - DADOS -->
                    <div id="step-1" class="step space-y-4">
                        <div class="bg-pink-50 rounded-2xl p-4 mb-2"><i class="fas fa-smile-wink text-pink-500"></i> <span class="font-medium">Primeiro, quero te conhecer melhor 🥰</span></div>
                        <div><label class="font-semibold text-gray-700">✨ Seu nome completo *</label><input id="resp-nome" type="text" class="modern-input mt-1" placeholder="Como você se chama?"></div>
                        <div><label class="font-semibold text-gray-700">📱 WhatsApp (com DDD) *</label><input id="resp-telefone" type="tel" class="modern-input mt-1" placeholder="(11) 99999-9999"></div>
                        <div><label class="font-semibold text-gray-700">✉️ E-mail *</label><input id="resp-email" type="email" class="modern-input mt-1" placeholder="seuemail@amor.com"></div>
                    </div>
                    
                    <!-- STEP 2 - HÁBITOS -->
                    <div id="step-2" class="step space-y-5">
                        <div class="bg-pink-50 rounded-2xl p-4 mb-2"><i class="fas fa-apple-alt text-pink-500"></i> <span class="font-medium">Sobre seus hábitos e gostos 🍎</span></div>
                        <div><span class="font-semibold text-gray-700">🎯 Objetivo principal *</span><div class="mt-2 space-y-2">${objetivoOptions.map(opt => `<div class="choice-card obj-choice" data-value="${opt}" onclick="setObjetivo('${opt}')"><div class="choice-radio"></div><span>${opt}</span></div>`).join('')}</div></div>
                        <div><label class="font-semibold text-gray-700">🍽️ Comida favorita *</label><input id="resp-comida" class="modern-input mt-1" placeholder="Ex: Strogonoff, Pizza, Sushi..."></div>
                        <div><label class="font-semibold text-gray-700">🍰 Doce favorito *</label><input id="resp-doce" class="modern-input mt-1" placeholder="Ex: Brigadeiro, Pudim, Chocolate..."></div>
                        <div><span class="font-semibold text-gray-700">💪 Nível de atividade física *</span><div class="mt-2 space-y-2">${atividadeOptions.map(opt => `<div class="choice-card atv-choice" data-value="${opt}" onclick="setAtividade('${opt}')"><div class="choice-radio"></div><span>${opt}</span></div>`).join('')}</div></div>
                        <div><span class="font-semibold text-gray-700">🚫 Restrições alimentares</span><div class="grid grid-cols-2 gap-2 mt-2">${restricoesOptions.map(r => `<div class="choice-card text-sm p-2" data-value="${r}" onclick="toggleRestricao('${r}', this)"><div class="choice-radio"></div><span>${r}</span></div>`).join('')}</div></div>
                    </div>
                    
                    <!-- STEP 3 - MENSAGEM -->
                    <div id="step-3" class="step space-y-4">
                        <div class="bg-pink-50 rounded-2xl p-4 mb-2"><i class="fas fa-envelope-open-text text-pink-500"></i> <span class="font-medium">Hora de retribuir o carinho! 💌</span></div>
                        <div><label class="font-semibold text-gray-700">Escreva uma mensagem especial para ${nomeRemetente} *</label><textarea id="resp-mensagem" rows="4" class="modern-textarea mt-1" placeholder="Querido(a) ${nomeRemetente}, obrigado por esse presente... Eu te amo porque... 💖"></textarea></div>
                        <div class="bg-rose-100 p-3 rounded-xl text-center text-rose-700 text-sm"><i class="fas fa-grin-hearts"></i> Essa mensagem vai fazer o coração dela(e) derreter!</div>
                    </div>
                    
                    <!-- STEP 4 - ENVIO -->
                    <div id="step-4" class="step text-center space-y-4">
                        <i class="fas fa-gift text-6xl text-pink-400"></i>
                        <h3 class="text-2xl font-playfair font-bold">Tudo pronto, meu amor 💕</h3>
                        <p class="text-gray-600">Assim que você enviar, ${nomeRemetente} vai receber suas respostas e um plano de nutrição personalizado para vocês dois será preparado.</p>
                        <div class="bg-green-50 p-4 rounded-2xl">
                            <i class="fas fa-check-circle text-green-500"></i> Nada será compartilhado sem seu consentimento. É só amor envolvido 🥰
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-8">
                        <button id="prev-btn" class="btn-secondary flex-1 py-3 rounded-full font-semibold"><i class="fas fa-arrow-left"></i> Voltar</button>
                        <button id="next-btn" class="btn-responder flex-1 py-3 rounded-full text-white font-semibold">Próximo →</button>
                    </div>
                </div>
            `;
        }
        
        function renderizarPagina() {
            if (!dadosPresente) {
                document.getElementById('app').innerHTML = `
                    <div class="hero-card p-10 text-center">
                        <i class="fas fa-heart-broken text-7xl text-pink-300 mb-5 floating"></i>
                        <h1 class="font-playfair text-3xl font-bold text-gray-700">💔 Link especial não encontrado</h1>
                        <p class="text-gray-500 mt-3">Parece que este presente ainda não foi criado ou o link é inválido.</p>
                        <p class="text-pink-500 mt-2">Peça para a pessoa especial gerar um presente para você! 💝</p>
                    </div>
                `;
                return;
            }
            
            const jaRespondeu = dadosPresente.presenteadoJaRespondeu || false;
            const nomeRemetente = dadosPresente?.comprador?.nome || dadosPresente?.nome || 'Alguém muito especial';
            const mensagemRecebida = dadosPresente?.mensagem || 'Você é a pessoa mais incrível da minha vida! 💖';
            const dataCriacao = dadosPresente?.criadoEm;
            
            if (jaRespondeu) {
                document.getElementById('app').innerHTML = `
                    <div class="hero-card p-8 md:p-12 text-center">
                        <i class="fas fa-check-circle text-6xl text-green-400 mb-4 floating"></i>
                        <h1 class="font-playfair text-3xl font-bold text-gray-800">💚 Você já respondeu esse presente!</h1>
                        <p class="text-gray-600 mt-3">Que lindo! ${nomeRemetente} já recebeu suas respostas com carinho.</p>
                        <p class="text-pink-500 mt-2">Em breve, o plano personalizado para o casal chegará. 💑</p>
                        <div class="mt-8"><i class="fas fa-heart text-pink-400 text-4xl floating"></i></div>
                    </div>
                `;
                return;
            }
            
            // Página completa com introdução + formulário (formulário escondido inicialmente)
            const html = `
                <div class="hero-card p-6 md:p-10">
                    <!-- INTRODUÇÃO (mostra inicialmente) -->
                    <div id="intro-section">
                        <div class="text-center">
                            <div class="inline-block p-4 bg-pink-100 rounded-full mb-4 floating">
                                <i class="fas fa-gift text-5xl text-pink-500"></i>
                            </div>
                            <h1 class="font-playfair text-4xl md:text-5xl font-bold bg-gradient-to-r from-pink-600 to-rose-500 bg-clip-text text-transparent">
                                Você ganhou um presente! 🎁
                            </h1>
                            <p class="text-gray-600 text-lg mt-3">${nomeRemetente} preparou algo especial <span class="text-pink-500 font-semibold">SOMENTE PARA VOCÊ</span> 💝</p>
                        </div>
                        
                        <div class="mensagem-card p-6 md:p-8 my-8">
                            <div class="flex items-start gap-3">
                                <i class="fas fa-quote-left text-3xl text-pink-400 opacity-60"></i>
                                <div class="flex-1">
                                    <p class="text-gray-800 text-xl md:text-2xl leading-relaxed italic font-medium">“${mensagemRecebida.replace(/"/g, '&quot;')}”</p>
                                    <div class="flex items-center gap-2 mt-4 text-pink-500">
                                        <i class="fas fa-heart text-sm"></i>
                                        <span class="text-sm">Com amor, ${nomeRemetente}</span>
                                        <i class="fas fa-heart text-sm"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-pink-50 rounded-3xl p-6 mb-8">
                            <div class="flex items-center gap-3 mb-4">
                                <i class="fas fa-star-of-life text-pink-500 text-xl"></i>
                                <h2 class="font-playfair text-2xl font-bold text-gray-800">💕 Como funciona esse presente?</h2>
                            </div>
                            <div class="grid md:grid-cols-3 gap-5 mt-4">
                                <div class="feature-card text-center"><div class="step-bubble bg-pink-100 mb-3"><span class="text-2xl font-bold text-pink-500">1</span></div><h3 class="font-bold">Responda o quiz</h3><p class="text-gray-500 text-sm">Sobre seus hábitos e gostos</p></div>
                                <div class="feature-card text-center"><div class="step-bubble bg-pink-100 mb-3"><span class="text-2xl font-bold text-pink-500">2</span></div><h3 class="font-bold">Criamos seu plano</h3><p class="text-gray-500 text-sm">Personalizado para o casal</p></div>
                                <div class="feature-card text-center"><div class="step-bubble bg-pink-100 mb-3"><span class="text-2xl font-bold text-pink-500">3</span></div><h3 class="font-bold">Recebem o PDF</h3><p class="text-gray-500 text-sm">Com cardápios e dicas</p></div>
                            </div>
                            <div class="mt-6 p-4 bg-white rounded-2xl border border-pink-200">
                                <p class="text-gray-600 text-sm"><span class="font-semibold text-pink-600">✨ Por que responder?</span> O presente só fica completo quando os dois participam! ${nomeRemetente} já respondeu e agora é sua vez. Juntos, vocês terão um plano especial. ❤️</p>
                            </div>
                        </div>
                        
                        <!-- Botão para iniciar resposta -->
                        <div class="text-center">
                            <button id="btn-iniciar" class="btn-responder text-white font-bold py-5 px-10 rounded-full text-xl shadow-xl transition-all w-full md:w-auto">
                                <i class="fas fa-heart mr-2"></i> Quero responder meu presente agora 
                                <i class="fas fa-arrow-right ml-2"></i>
                            </button>
                        </div>
                    </div>
                    
                    ${renderizarFormulario()}
                    
                    <div class="mt-8 pt-4 text-center border-t border-pink-100">
                        <p class="text-pink-400 text-sm"><i class="fas fa-heart"></i> Nutri do Casal - Cuidar de quem a gente ama é a melhor nutrição <i class="fas fa-heart"></i></p>
                        ${dataCriacao ? `<p class="text-gray-400 text-xs mt-2">Presente criado em ${formatarData(dataCriacao)}</p>` : ''}
                    </div>
                </div>
            `;
            
            document.getElementById('app').innerHTML = html;
            
            // Bind do botão iniciar
            const btnIniciar = document.getElementById('btn-iniciar');
            if (btnIniciar) {
                btnIniciar.addEventListener('click', iniciarResposta);
            }
        }
        
        function mostrarLoading() {
            document.getElementById('app').innerHTML = `
                <div class="hero-card p-12 text-center">
                    <div class="inline-block"><i class="fas fa-heart text-6xl text-pink-400 animate-pulse"></i></div>
                    <div class="skeleton h-8 w-3/4 mx-auto mt-6"></div>
                    <div class="skeleton h-20 w-full mt-4"></div>
                    <p class="text-gray-400 mt-6">Carregando seu presente especial... 💕</p>
                </div>
            `;
        }
        
        async function init() {
            casalId = getCasalIdFromURL();
            console.log('Casal ID:', casalId);
            
            if (!casalId) {
                dadosPresente = null;
                renderizarPagina();
                return;
            }
            
            mostrarLoading();
            dadosPresente = await carregarDadosPresente(casalId);
            renderizarPagina();
        }
        
        init();
    </script>
</body>
</html>
