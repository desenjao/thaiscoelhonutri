        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

        }



        :root {

            --bg-page: #FEF6F6;

            --white-card: #FFFFFF;

            --rose-light: #FDE8E8;

            --rose-primary: #D6586A;

            --rose-dark: #B83B4D;

            --rose-highlight: #E87A8E;

            --text-dark: #2C3E2F;

            --text-light: #6B7C6E;

            --border-light: #F0E2E2;

            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.02);

            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.05);

            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);

            --orange-warning: #E8A87C;

            --error-red: #e74c3c;

            --success-green: #27AE60;

            --success-dark: #1E8449;

            --gold: #F5B042;

        }



        body {

            font-family: 'Inter', sans-serif;

            background: linear-gradient(145deg, #FEF6F6 0%, #F9FBF8 100%);

            min-height: 100vh;

            color: var(--text-dark);

            font-weight: 400;

        }



        h1, h2, h3, h4, .perfil-badge, .chart-title {

            font-family: 'Playfair Display', serif;

            font-weight: 500;

            letter-spacing: -0.01em;

        }



        .container {

            max-width: 800px;

            margin: 0 auto;

            padding: 40px 20px 60px;

        }



        .header-logo {

            text-align: center;

            padding: 24px 20px 12px;

        }

        .logo-circle {

            background: linear-gradient(145deg, var(--rose-primary), var(--rose-dark));

            width: 56px;

            height: 56px;

            border-radius: 50%;

            display: inline-flex;

            align-items: center;

            justify-content: center;

            box-shadow: var(--shadow-md);

            transition: transform 0.3s ease;

        }

        .logo-circle:hover {

            transform: scale(1.05);

        }

        .logo-circle i {

            font-size: 28px;

            color: white;

        }



        .report-card {

            background: white;

            border-radius: 36px;

            padding: 40px 32px;

            margin-top: 12px;

            box-shadow: var(--shadow-md);

            animation: fadeInUp 0.5s ease;

        }

        @keyframes fadeInUp {

            from {

                opacity: 0;

                transform: translateY(30px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }



        .perfil-badge {

            background: var(--rose-light);

            display: inline-block;

            padding: 8px 24px;

            border-radius: 60px;

            font-weight: 600;

            color: var(--rose-dark);

            margin: 16px 0 20px;

            font-size: 1rem;

        }



        .sintomas-grid {

            display: grid;

            grid-template-columns: repeat(2, 1fr);

            gap: 12px;

            margin: 20px 0;

        }

        .sintoma-item {

            background: var(--rose-light);

            padding: 12px;

            border-radius: 16px;

            display: flex;

            align-items: center;

            gap: 10px;

            font-size: 0.85rem;

        }

        .sintoma-item i {

            color: var(--rose-primary);

            font-size: 1.1rem;

        }



        .chart-container {

            background: #FEF6F6;

            border-radius: 24px;

            padding: 24px;

            margin: 24px 0;

            border: 1px solid var(--border-light);

        }

        .chart-title {

            font-size: 1rem;

            font-weight: 600;

            color: var(--text-dark);

            margin-bottom: 20px;

            text-align: center;

        }

        .chart-item {

            margin-bottom: 18px;

        }

        .chart-label {

            display: flex;

            justify-content: space-between;

            font-size: 0.75rem;

            font-weight: 500;

            margin-bottom: 6px;

            color: var(--text-dark);

        }

        .chart-bar-bg {

            height: 8px;

            background: var(--rose-light);

            border-radius: 10px;

            overflow: hidden;

        }

        .chart-bar-fill {

            height: 100%;

            background: linear-gradient(90deg, var(--rose-primary), var(--rose-dark));

            border-radius: 10px;

            width: 0%;

            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);

        }

        .chart-percent {

            font-weight: 700;

            color: var(--rose-primary);

        }



        .strengths-card, .opportunities-card {

            background: #FEF6F6;

            border-radius: 24px;

            padding: 20px;

            margin-top: 16px;

            text-align: left;

        }

        .strengths-card h4, .opportunities-card h4 {

            font-size: 0.9rem;

            margin-bottom: 12px;

            display: flex;

            align-items: center;

            gap: 8px;

            font-family: 'Playfair Display', serif;

        .strengths-card ul, .opportunities-card ul {

            list-style: none;

            padding-left: 0;

        }

        .strengths-card li, .opportunities-card li {

            font-size: 0.85rem;

            margin-bottom: 10px;

            display: flex;

            align-items: center;

            gap: 10px;

        .strengths-card li i {

            color: var(--rose-primary);

            font-size: 0.75rem;

        .opportunities-card li i {

            font-size: 0.75rem;

            margin-right: 8px;

        }

            margin-top: 8px;

            font-style: italic;

            line-height: 1.5;

        }



        .flex-col {

            display: flex;

            flex-direction: column;

            gap: 24px;

            margin: 28px 0;

        }

            color: #FFFFFF;

            padding: 35px 24px;

            border-radius: 32px;

            text-align: center;

            box-shadow: 0 20px 40px rgba(0,0,0,0.3);

            border: 1px solid rgba(255,215,0,0.3);

            position: relative;

            overflow: hidden;

        }

        

        .card-upsell::before {

            content: '';

            position: absolute;

            top: -50%;

            left: -50%;

            width: 200%;

            height: 200%;

            background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);

            pointer-events: none;

        }

            border-radius: 50px;

            display: inline-block;

            font-size: 0.75rem;

            font-weight: 900;

            text-transform: uppercase;

            letter-spacing: 2px;

            margin-bottom: 20px;

            box-shadow: 0 4px 15px rgba(0,0,0,0.2);

            animation: subtleGlow 2s infinite;

            0% { box-shadow: 0 4px 15px rgba(245,176,66,0.3); }

            50% { box-shadow: 0 4px 25px rgba(245,176,66,0.7); }

            100% { box-shadow: 0 4px 15px rgba(245,176,66,0.3); }

            50% {

                transform: scale(1.02);

                box-shadow: 0 12px 35px rgba(37,211,102,0.7);

            }

            100% {

                box-shadow: 0 8px 25px rgba(37,211,102,0.4);

            border: 1.5px solid var(--border-light);

            color: var(--rose-dark);

            gap: 8px;

            padding: 60px 20px;

        .loading-spinner i {

            font-size: 48px;

            color: var(--rose-primary);

            margin-bottom: 16px;

            0% { transform: scale(1); opacity: 0.6; }

            50% { transform: scale(1.1); opacity: 1; }

            right: 20px;

            background: #2C3E2F;

            color: white;

            padding: 8px 15px;

            border-radius: 50px;

            font-size: 0.7rem;

            font-weight: bold;

            z-index: 999;

            transition: all 0.3s ease;

            background: var(--rose-primary);

            transform: scale(1.05);

        @media (max-width: 600px) {

            .container {

            .badge-hot {

                padding: 6px 14px;

            .sintomas-grid {

            }

            .btn-whatsapp {

                font-size: 0.9rem;

                padding: 14px;

            }

        }

    </style>

                estrategia: "Priorize proteínas magras no almoço (frango, peixe, ovos) para estabilizar a energia, magnésio antes de dormir para melhorar o sono reparador, e evite cafeína em excesso - ela dá um pico de energia seguido de queda brusca que piora a fadiga.",
                scores: { equilibrio: 32, energia: 20, controle: 35, bemEstar: 28 },
                strengths: [
                    "😴 Você respeita os limites do seu corpo",
                    "💪 Continua fazendo o necessário mesmo cansada - guerreira!",
                    "🎯 Quer mais energia para viver melhor, não só sobreviver",
                    "🧠 Reconhece que descanso não é preguiça"
                ],
                opportunities: [
                    "🛌 Acordar e continuar cansada",
                    "📉 Queda de produtividade no trabalho/estudos",
                    "😫 Irritabilidade causada pela exaustão",
                    "🍽️ Compulsão por carboidratos para tentar ter energia"
                ],
                dica_extra: "💡 Você já teve que cancelar compromissos porque simplesmente não tinha energia? Não se culpe. Seu corpo está te pedindo descanso - e isso é sabedoria, não fraqueza!",
                depoimento_real: "Cansaço sem motivo - Sergiana"
            }
        };

        // Mapeamento inteligente baseado nas respostas reais
        function getDiagnosticoTPM(faseTpm, compulsao, emocional, objetivo) {
            
            // INCHADO: prioriza inchaço
            if (faseTpm && (faseTpm.includes("inchada") || faseTpm.includes("pesada")) || 
                compulsao === "Inchaço e retenção" || 
                objetivo === "Reduzir o inchaço") {
                return diagnosticosTPM.inchaco;
            }
            
            // IRRITADA: irritação extrema
            if (faseTpm && (faseTpm.includes("irritada") || faseTpm.includes("extrema")) ||
                objetivo === "Controlar a irritação") {
                return diagnosticosTPM.irritada;
            }
            
            // COMPULSÃO: desconta tudo na comida
            if (faseTpm && (faseTpm.includes("Desconto") || faseTpm.includes("comida")) ||
                compulsao === "Vontade absurda de doce" ||
                objetivo === "Parar a compulsão alimentar") {
                return diagnosticosTPM.comida;
            }
            
            // CANSACO: fadiga
            if (compulsao === "Cansaço sem motivo" ||
                objetivo === "Ter mais energia") {
                return diagnosticosTPM.cansaco;
            }
            
            // OSCILAÇÃO: padrão misto
            if (emocional && (emocional.includes("sensível") || emocional.includes("paciência"))) {
                return diagnosticosTPM.oscilacao;
            }
            
            return diagnosticosTPM.comida;
        }
        

        function escapeHtml(text) {

            if (!text) return '';

            const div = document.createElement('div');

            div.textContent = text;

            return div.innerHTML;

        }

        // Dados de exemplo para modo admin (baseado em lead real)
        const demoUserData = {
            nome: "Sirlene",
            telefone: "(89) 98146-7924",
            email: "sirlene@exemplo.com",
            fase_tpm: "Desconto tudo na comida",
            compulsao: "Vontade absurda de doce",
            alimentacao: "Sim, completamente",
            emocional: "Sem paciência com ninguém",
            objetivo: "Controlar a irritação",
            mensagem: "Perco o controle"
        };

        function renderTPMReport(userData) {
            const perfil = getDiagnosticoTPM(userData.fase_tpm, userData.compulsao, userData.emocional, userData.objetivo);
            const primeiroNome = userData.nome ? userData.nome.split(' ')[0] : "Visitante";

            // Mapear respostas para exibição
            const sintomas = [
                { icon: "fa-face-angry", label: "Como a TPM te afeta", value: userData.fase_tpm },
                { icon: "fa-cookie-bite", label: "Sintoma que mais incomoda", value: userData.compulsao },
                { icon: "fa-burger", label: "Alimentação na TPM", value: userData.alimentacao },
                { icon: "fa-heart", label: "Como fica emocionalmente", value: userData.emocional },
                { icon: "fa-bullseye", label: "O que quer melhorar", value: userData.objetivo }
            ].filter(s => s.value);

            const sintomasHtml = `
                <div class="sintomas-grid">
                    ${sintomas.map(s => `
                        <div class="sintoma-item">
                            <i class="fas ${s.icon}"></i>
                            <div><strong>${s.label}:</strong><br>${escapeHtml(s.value)}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            // Gráfico de diagnóstico
            const chartItems = [
                { label: "Equilíbrio Hormonal", key: "equilibrio", icon: "fa-balance-scale" },
                { label: "Nível de Energia", key: "energia", icon: "fa-bolt" },
                { label: "Controle Emocional", key: "controle", icon: "fa-heart" },
                { label: "Bem-estar Geral", key: "bemEstar", icon: "fa-smile" }
            ];

            let chartHtml = `<div class="chart-container"><div class="chart-title">📊 SEU PERFIL HORMONAL - ${perfil.titulo}</div>`;
            chartItems.forEach(item => {
                const percent = perfil.scores[item.key] || 50;
                chartHtml += `
                    <div class="chart-item">
                        <div class="chart-label">
                            <span><i class="fas ${item.icon}" style="margin-right: 6px;"></i> ${item.label}</span>
                            <span class="chart-percent">${percent}%</span>
                        </div>
                        <div class="chart-bar-bg">
                            <div class="chart-bar-fill" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
            });
            chartHtml += `</div>`;

            // Forças personalizadas
            const strengthsHtml = `
                <div class="strengths-card">
                    <h4><i class="fas fa-star" style="color: var(--rose-primary);"></i> 💪 SUAS FORÇAS (QUE VOCÊ NÃO PERCEBE)</h4>
                    <ul>
                        ${perfil.strengths.map(s => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(s)}</li>`).join('')}
                    </ul>
                </div>
            `;

            const opportunitiesHtml = `
                <div class="opportunities-card">
                    <h4><i class="fas fa-bullseye" style="color: var(--orange-warning);"></i> 🎯 O QUE PODEMOS TRANSFORMAR JUNTAS</h4>
                    <ul>
                        ${perfil.opportunities.map(o => `<li><i class="fas fa-arrow-right"></i> ${escapeHtml(o)}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            const descricaoHtml = `
                <div style="background: linear-gradient(135deg, #FDE8E8, #FFF5F5); padding: 20px; border-radius: 20px; margin: 20px 0;">
                    <h3 style="color: var(--rose-dark); margin-bottom: 8px;">📖 ${perfil.titulo}</h3>
                    <h4 style="color: var(--text-light); margin-bottom: 16px; font-size: 0.9rem;">${perfil.subtitulo}</h4>
                    <p style="line-height: 1.6;">${perfil.descricao}</p>
                    ${perfil.sintomas_comuns ? `
                        <div style="margin-top: 16px; background: white; border-radius: 16px; padding: 12px;">
                            <strong><i class="fas fa-list"></i> Sintomas comuns nesse perfil:</strong>
                            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px;">
                                ${perfil.sintomas_comuns.map(s => `<span style="background: var(--rose-light); padding: 4px 12px; border-radius: 20px; font-size: 0.7rem;">${s}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            
            const estrategiaHtml = `
                <div style="background: #E8F5E9; padding: 20px; border-radius: 20px; margin: 20px 0; border-left: 4px solid #27AE60;">
                    <h3 style="color: #1E8449; margin-bottom: 8px;">🌿 ESTRATÉGIA PERSONALIZADA</h3>
                    <p style="line-height: 1.6;">${perfil.estrategia}</p>
                    <div style="margin-top: 12px; background: white; border-radius: 12px; padding: 12px;">
                        <i class="fas fa-lightbulb" style="color: #F5B042;"></i>
                        <strong>${perfil.dica_extra || "Dica especial para você:"}</strong>
                    </div>
                </div>
            `;
            
            const depoimentoHtml = perfil.depoimento_real ? `
                <div style="background: #F3E5F5; padding: 16px; border-radius: 20px; margin: 20px 0; text-align: center; font-style: italic;">
                    <i class="fas fa-quote-left" style="color: #9C27B0; margin-right: 8px;"></i>
                    "${perfil.depoimento_real}"
                    <div style="margin-top: 8px; font-size: 0.7rem; color: var(--text-light);">— Depoimento real de uma mulher como você</div>
                </div>
            ` : '';

            const mensagemHtml = userData.mensagem ? `
                <div class="mensagem-card">
                    <i class="fas fa-comment-dots"></i> <strong>💬 Sua mensagem para a Thaís:</strong>
                    <p>"${escapeHtml(userData.mensagem)}"</p>
                </div>
            ` : '';

            const adminWarning = (admin === 1) ? `
                <div style="background: #F5B04220; border: 2px solid #F5B042; border-radius: 16px; padding: 12px; margin-bottom: 20px; text-align: center;">
                    <i class="fas fa-crown" style="color: #F5B042;"></i>
                    <strong style="color: #B83B4D;"> Modo Administrador - Visualização do perfil: ${perfil.titulo}</strong>
                    <small style="display: block; color: var(--text-light); margin-top: 5px;">Baseado nos dados reais dos seus leads</small>
                </div>
            ` : '';

            return `<div class="report-card">

    ${adminWarning}

    <div class="perfil-badge" style="background: linear-gradient(90deg, #075E54, #128C7E); color: white; font-weight: bold; letter-spacing: 2px; padding: 6px 20px; border-radius: 50px; display: inline-block; margin-bottom: 20px;">
        ⭐ CONVITE EXCLUSIVO PARA O WHATSAPP
    </div>
    
    <h1 style="font-size: 1.8rem; font-weight: 800; color: var(--text-dark); margin-bottom: 10px;">
        Olá, <span style="color: #075E54;">${escapeHtml(primeiroNome)}</span>!
    </h1>
    
    <p style="margin: 16px 0; line-height: 1.6; font-size: 1rem; color: var(--text-light);">
        Baseado no seu perfil da TPM, preparei uma análise detalhada e personalizada para você entender melhor o que está acontecendo no seu corpo.
    </p>
    
    ${descricaoHtml}
    
    ${sintomasHtml}
    
    ${chartHtml}
    
    ${estrategiaHtml}
    
    ${strengthsHtml}
    
    ${opportunitiesHtml}
    
    ${depoimentoHtml}
    
    ${mensagemHtml}
    
    <!-- CARD WHATSAPP GROUP -->
    <div class="card-upsell" style="margin-top: 30px;">
    
        <div class="badge-hot">
            <i class="fab fa-whatsapp"></i> ENTRADA LIBERADA HOJE
        </div>
        
        <h3 style="color: white; margin-bottom: 15px; font-size: 1.4rem;">
            🔓 Grupo VIP de Apoio no WhatsApp
        </h3>
        
        <p style="margin-bottom: 15px; opacity: 0.9;">
            Junte-se a outras mulheres que estão vivendo a mesma jornada
        </p>
        
        <div class="benefits-list">
            <div><i class="fas fa-check-circle"></i> Dicas práticas de nutrição toda semana</div>
            <div><i class="fas fa-check-circle"></i> Estratégias para cada fase do ciclo</div>
            <div><i class="fas fa-check-circle"></i> Suporte emocional da comunidade</div>
            <div><i class="fas fa-check-circle"></i> Conteúdos exclusivos e gratuitos</div>
        </div>
        
        <div style="margin: 20px 0 10px 0;">
            <span class="discount-badge">
                ⚡ VAGAS LIMITADAS
            </span>
        </div>
        
        <a href="${WHATSAPP_GROUP_LINK}" class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp" style="margin-right: 8px;"></i>
            QUERO FAZER PARTE
            <small>✦ Clique e entre no grupo gratuitamente ✦</small>
        </a>
        
        <p style="font-size: 0.7rem; margin-top: 20px; opacity: 0.8;">
            <i class="fas fa-lock"></i> Ambiente seguro, acolhedor e moderado
        </p>
    </div>

    <div class="termo-etica" style="margin-top: 25px;">
        🔒 Ao entrar no grupo você concorda com as regras de convivência e respeito mútuo.
    </div>
    
</div>`;

        }

        function showError(message) {

            document.getElementById('reportContainer').innerHTML = `

                <div class="report-card" style="text-align: center;">

                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--orange-warning); margin-bottom: 16px;"></i>

                    <h2>Ops! Dados não encontrados</h2>

                    <p style="margin: 16px 0;">${message || 'Você precisa fazer o quiz da TPM primeiro para acessar sua análise personalizada.'}</p>

                    ${admin === 1 ? '<p style="margin: 10px 0; padding: 10px; background: #F5B04220; border-radius: 8px;"><i class="fas fa-info-circle"></i> Modo admin ativo - Recarregue a página para ver o demo</p>' : ''}

                    <a href="tpm.html" style="display: inline-block; margin-top: 20px; text-decoration: none; background: linear-gradient(135deg, var(--rose-primary), var(--rose-dark)); color: white; padding: 14px 28px; border-radius: 60px;">FAZER O TESTE AGORA →</a>

                </div>

            `;

        }

        function loadDataAndRender() {
            
            if (admin === 1) {
                document.getElementById('reportContainer').innerHTML = renderTPMReport(demoUserData);
                return;
            }
            
            const storedData = sessionStorage.getItem(SESSION_KEY_TPM);

            if (!storedData) {
                showError('Nenhum dado encontrado. Por favor, realize o quiz da TPM primeiro.');
                return;
            }

            try {
                const userData = JSON.parse(storedData);
                
                if (!userData.nome || !userData.telefone || !userData.email) {
                    showError('Dados incompletos. Por favor, realize o quiz da TPM novamente.');
                    return;
                }

                document.getElementById('reportContainer').innerHTML = renderTPMReport(userData);

                const backBtn = document.getElementById('backBtn');
                if(backBtn) {
                    backBtn.addEventListener('click', () => {
                        window.location.href = 'tpm.html';
                    });
                }

            } catch (error) {
                console.error('Erro ao processar dados:', error);
                showError('Erro ao carregar seus dados. Por favor, tente novamente.');
            }
        }

        loadDataAndRender();

    })();

</script>

</body>
