<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Thaís Coelho | Seu Diagnóstico Alimentar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-page: #F9FBF8;
            --white-card: #FFFFFF;
            --green-soft: #E2F0E6;
            --green-primary: #2D6A4F;
            --green-dark: #1B4D3E;
            --green-highlight: #40916C;
            --text-dark: #2C3E2F;
            --text-light: #6B7C6E;
            --border-light: #E6EDE8;
            --shadow-sm: 0 4px 16px rgba(0, 0, 0, 0.02);
            --shadow-md: 0 8px 28px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 20px 40px rgba(0, 0, 0, 0.08);
            --orange-warning: #E8A87C;
            --error-red: #e74c3c;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, var(--bg-page) 0%, #F3F7F4 100%);
            min-height: 100vh;
            color: var(--text-dark);
            font-weight: 400;
        }

        h1, h2, h3, h4, .perfil-badge, .chart-title {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .header-logo {
            text-align: center;
            padding: 24px 20px 12px;
        }
        .logo-circle {
            background: linear-gradient(145deg, var(--green-primary), var(--green-dark));
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease;
        }
        .logo-circle:hover {
            transform: scale(1.05);
        }
        .logo-circle i {
            font-size: 28px;
            color: white;
        }

        .report-card {
            background: white;
            border-radius: 36px;
            padding: 40px 32px;
            margin-top: 12px;
            box-shadow: var(--shadow-md);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .perfil-badge {
            background: var(--green-soft);
            display: inline-block;
            padding: 8px 24px;
            border-radius: 60px;
            font-weight: 600;
            color: var(--green-dark);
            margin: 16px 0 20px;
            font-size: 1rem;
        }

        .chart-container {
            background: #F8FBF9;
            border-radius: 24px;
            padding: 24px;
            margin: 24px 0;
            border: 1px solid var(--border-light);
        }
        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 20px;
            text-align: center;
        }
        .chart-item {
            margin-bottom: 18px;
        }
        .chart-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 6px;
            color: var(--text-dark);
        }
        .chart-bar-bg {
            height: 8px;
            background: var(--green-soft);
            border-radius: 10px;
            overflow: hidden;
        }
        .chart-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--green-primary), var(--green-highlight));
            border-radius: 10px;
            width: 0%;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .chart-percent {
            font-weight: 700;
            color: var(--green-primary);
        }

        .strengths-card, .opportunities-card {
            background: #F8FBF9;
            border-radius: 24px;
            padding: 20px;
            margin-top: 16px;
            text-align: left;
        }
        .strengths-card h4, .opportunities-card h4 {
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Playfair Display', serif;
        }
        .strengths-card ul, .opportunities-card ul {
            list-style: none;
            padding-left: 0;
        }
        .strengths-card li, .opportunities-card li {
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .strengths-card li i {
            color: var(--green-primary);
            font-size: 0.75rem;
        }
        .opportunities-card li i {
            color: var(--orange-warning);
            font-size: 0.75rem;
        }

        .mensagem-card {
            background: var(--green-soft);
            border-radius: 20px;
            padding: 20px;
            margin: 24px 0;
            text-align: left;
            border-left: 4px solid var(--green-primary);
        }
        .mensagem-card i {
            color: var(--green-primary);
            margin-right: 8px;
        }
        .mensagem-card p {
            margin-top: 8px;
            font-style: italic;
            line-height: 1.5;
        }

        .flex-col {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin: 28px 0;
        }
        .card-downsell, .card-upsell {
            border-radius: 28px;
            padding: 24px 20px;
            text-align: left;
            transition: transform 0.2s ease;
        }
        .card-downsell:hover, .card-upsell:hover {
            transform: translateY(-4px);
        }
        .card-downsell {
            background: #F9FDFA;
            border: 1px solid var(--border-light);
        }
        .card-upsell {
            background: linear-gradient(135deg, var(--green-primary) 0%, #195a42 100%);
            color: white;
            position: relative;
        }
        .badge-hot {
            position: absolute;
            top: 14px;
            right: -28px;
            background: #F5B042;
            color: #1A3B2C;
            padding: 6px 40px;
            transform: rotate(45deg);
            font-size: 0.7rem;
            font-weight: 800;
        }
        .btn-downsell, .btn-upsell {
            display: block;
            text-align: center;
            padding: 14px;
            border-radius: 60px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
            transition: all 0.2s;
        }
        .btn-downsell {
            background: linear-gradient(135deg, var(--green-primary), var(--green-dark));
            color: white;
        }
        .btn-upsell {
            background: #25D366;
            color: white;
        }
        .btn-downsell:hover, .btn-upsell:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .termo-etica {
            margin-top: 28px;
            padding: 16px;
            background: #F5F8F5;
            border-radius: 20px;
            font-size: 0.65rem;
            color: var(--text-light);
            font-style: italic;
            text-align: center;
        }

        .footer-site {
            text-align: center;
            margin-top: 32px;
            padding-top: 16px;
            font-size: 0.65rem;
            color: #8BA298;
            border-top: 1px solid #E2EDE8;
            font-style: italic;
        }

        .btn-voltar {
            background: transparent;
            border: 1.5px solid var(--border-light);
            color: var(--green-dark);
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-voltar:hover {
            background: var(--green-soft);
            border-color: var(--green-primary);
        }

        /* Loading dentro do resultado */
        .loading-spinner {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-spinner i {
            font-size: 48px;
            color: var(--green-primary);
            margin-bottom: 16px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px 16px 40px;
            }
            .report-card {
                padding: 24px 20px;
            }
            .badge-hot {
                right: -20px;
                font-size: 0.6rem;
                padding: 4px 30px;
            }
        }
    </style>
</head>
<body>

<div class="header-logo">
    <div class="logo-circle">
        <i class="fas fa-seedling"></i>
    </div>
</div>

<div class="container">
    <div id="reportContainer">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>Carregando seu diagnóstico personalizado...</p>
        </div>
    </div>
    <div class="footer-site">
        © 2026 · Thaís Coelho Nutrição · Autoconhecimento alimentar
    </div>
</div>

<script>
    (function() {
        // ============================================
        // CHAVE PARA RECUPERAR DADOS DO sessionStorage
        // ============================================
        const SESSION_KEY = 'thais_coelho_dados_usuario';
        
        // ============================================
        // DIAGNÓSTICOS BASEADOS NO DESAFIO
        // ============================================
        const diagnosticos = {
            ansiedade_doces: {
                titulo: "🍫 Fome Emocional",
                descricao: "Seu padrão mostra busca por dopamina em momentos de estresse ou ansiedade. Isso afeta a saciedade e escolhas alimentares.",
                estrategia: "Identificar gatilhos emocionais é libertador. Ajustes simples na rotina alimentar podem equilibrar isso.",
                scores: { emocional: 78, metabolismo: 52, organizacao: 38, consistencia: 45 },
                strengths: ["Alta autoconsciência sobre seus hábitos", "Motivação para mudança", "Percebe seus gatilhos emocionais"],
                opportunities: ["Criar estratégias para lidar com ansiedade", "Estabelecer rotina alimentar", "Praticar alimentação consciente"]
            },
            metabolismo_lento: {
                titulo: "🐢 Metabolismo Adaptado",
                descricao: "Histórico de dietas restritivas fez seu corpo economizar energia, criando um platô metabólico.",
                estrategia: "Realimentação estratégica e variação calórica são caminhos para destravar o metabolismo.",
                scores: { emocional: 45, metabolismo: 82, organizacao: 55, consistencia: 48 },
                strengths: ["Resiliência e disciplina", "Conhecimento sobre dietas", "Persistência nos objetivos"],
                opportunities: ["Aumentar metabolismo basal", "Variar ingestão calórica", "Incluir treino de força"]
            },
            falta_tempo: {
                titulo: "⏰ Rotina Acelerada",
                descricao: "Seu desafio não é saber o que fazer, mas encaixar na correria do dia a dia.",
                estrategia: "Meal prep express e receitas de 15 minutos podem se encaixar perfeitamente na sua rotina.",
                scores: { emocional: 42, metabolismo: 48, organizacao: 76, consistencia: 52 },
                strengths: ["Produtividade", "Foco em resultados", "Adaptabilidade"],
                opportunities: ["Organização semanal de refeições", "Receitas rápidas e nutritivas", "Automação de hábitos"]
            },
            efeito_sanfona: {
                titulo: "🔄 Ciclo Restrição-Compulsão",
                descricao: "Você emagrece na força de vontade, mas recupera o peso porque o método é insustentável.",
                estrategia: "Reeducação alimentar sem dietas restritivas é o caminho sustentável para você.",
                scores: { emocional: 68, metabolismo: 58, organizacao: 52, consistencia: 72 },
                strengths: ["Força de vontade", "Capacidade de seguir planos", "Autodisciplina"],
                opportunities: ["Sair do ciclo restrição-compulsão", "Construir hábitos sustentáveis", "Respeitar a saciedade"]
            }
        };
        
        // Ofertas por gênero
        const ofertas = {
            Feminino: {
                titulo: "Protocolo Magra 21D",
                descricao: "Plano completo para mulheres que querem emagrecer com saúde e sem sofrimento.",
                preco_parcela: "R$ 68,90",
                preco_avista: "R$ 297",
                parcelas: 5
            },
            Masculino: {
                titulo: "Protocolo Semente",
                descricao: "Estratégia para homens que querem queimar gordura e ganhar massa muscular.",
                preco_parcela: "R$ 79,90",
                preco_avista: "R$ 347",
                parcelas: 5
            }
        };
        
        function determinarPerfil(desafio) {
            if(desafio && desafio.includes("Ansiedade")) return diagnosticos.ansiedade_doces;
            if(desafio && desafio.includes("Metabolismo lento")) return diagnosticos.metabolismo_lento;
            if(desafio && desafio.includes("Falta de tempo")) return diagnosticos.falta_tempo;
            if(desafio && desafio.includes("Efeito sanfona")) return diagnosticos.efeito_sanfona;
            return diagnosticos.metabolismo_lento;
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function renderReport(userData) {
            const perfil = determinarPerfil(userData.desafio);
            const oferta = userData.genero === "Masculino" ? ofertas.Masculino : ofertas.Feminino;
            const primeiroNome = userData.nome ? userData.nome.split(' ')[0] : "Visitante";
            const mapeamentoId = 'MAP_' + Math.random().toString(36).substring(2, 8).toUpperCase();
            
            // Log para tracking (apenas desenvolvimento, em produção enviar para API)
            console.log(`✅ Mapeamento gerado - Nome: ${primeiroNome} | Telefone: ${userData.telefone} | Email: ${userData.email} | Perfil: ${perfil.titulo} | ID: ${mapeamentoId}`);
            
            const chartItems = [
                { label: "Controle Emocional", key: "emocional", icon: "fa-brain" },
                { label: "Metabolismo", key: "metabolismo", icon: "fa-tachometer-alt" },
                { label: "Organização", key: "organizacao", icon: "fa-calendar-alt" },
                { label: "Consistência", key: "consistencia", icon: "fa-chart-line" }
            ];
            
            let chartHtml = `<div class="chart-container"><div class="chart-title">📊 SEU PERFIL ALIMENTAR</div>`;
            chartItems.forEach(item => {
                const percent = perfil.scores[item.key] || 50;
                chartHtml += `
                    <div class="chart-item">
                        <div class="chart-label">
                            <span><i class="fas ${item.icon}" style="margin-right: 6px;"></i> ${item.label}</span>
                            <span class="chart-percent">${percent}%</span>
                        </div>
                        <div class="chart-bar-bg">
                            <div class="chart-bar-fill" style="width: ${percent}%;"></div>
                        </div>
                    </div>
                `;
            });
            chartHtml += `</div>`;
            
            const strengthsHtml = `
                <div class="strengths-card">
                    <h4><i class="fas fa-star" style="color: var(--green-primary);"></i> 💪 SUAS FORÇAS</h4>
                    <ul>
                        ${perfil.strengths.map(s => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(s)}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            const opportunitiesHtml = `
                <div class="opportunities-card">
                    <h4><i class="fas fa-bullseye" style="color: var(--orange-warning);"></i> 🎯 OPORTUNIDADES DE MELHORIA</h4>
                    <ul>
                        ${perfil.opportunities.map(o => `<li><i class="fas fa-arrow-right"></i> ${escapeHtml(o)}</li>`).join('')}
                    </ul>
                </div>
            `;
            
            const mensagemHtml = userData.mensagem ? `
                <div class="mensagem-card">
                    <i class="fas fa-comment-dots"></i> <strong>💬 Mensagem para Thaís Coelho:</strong>
                    <p>"${escapeHtml(userData.mensagem)}"</p>
                </div>
            ` : '';
            
            const html = `
    <div class="report-card">
        <i class="fas fa-chart-simple" style="font-size: 48px; color: var(--green-primary); margin-bottom: 16px;"></i>
        <h1 style="font-size: 1.8rem;">Olá, <span style="color: var(--green-primary);">${escapeHtml(primeiroNome)}</span>!</h1>
        <div class="perfil-badge">${perfil.titulo}</div>
        <p style="margin: 16px 0; line-height: 1.6; font-size: 1rem;">${perfil.descricao}</p>
        <p style="margin-bottom: 20px; background: #F0F9F3; padding: 16px; border-radius: 28px; line-height: 1.5;">💡 <strong>Estratégia recomendada:</strong> ${perfil.estrategia}</p>
        
        ${mensagemHtml}
        ${chartHtml}
        ${strengthsHtml}
        ${opportunitiesHtml}
        
        <div style="margin: 32px 0 16px;">
            <div style="width: 50px; height: 2px; background: var(--border-light); margin: 0 auto 20px;"></div>
            <h2 style="font-size: 1.4rem; text-align: center;">📌 Seu próximo passo</h2>
            <p style="text-align: center; color: var(--text-light); margin-top: 8px;">Continue sua jornada com a Thaís Coelho</p>
        </div>
        
        <!-- APENAS UM BOTÃO PARA O GRUPO DO WHATSAPP -->
        <div class="flex-col">
            <div class="card-upsell" style="max-width: 100%;">
                <div class="badge-hot">COMUNIDADE VIP</div>
                <i class="fab fa-whatsapp" style="font-size: 48px; margin-bottom: 10px; color: #25D366;"></i>
                <h3 style="font-size: 1.4rem;">Grupo Exclusivo no WhatsApp</h3>
                <p style="opacity:0.9; margin: 8px 0; line-height: 1.4;">Receba dicas diárias, receitas saudáveis e suporte da comunidade!</p>
                <div style="margin: 16px 0;">
                    <div>✔ Dicas nutricionais exclusivas</div>
                    <div>✔ Receitas práticas e saudáveis</div>
                    <div>✔ Suporte comunitário 24/7</div>
                    <div>✔ Conteúdos gratuitos semanais</div>
                </div>
                <a href="https://chat.whatsapp.com/KvAGrcAm5lECrRS0igGWj9?mode=gi_t" class="btn-upsell" id="whatsappGroupBtn" target="_blank" style="background: #25D366; background: linear-gradient(135deg, #25D366, #128C7E);">
                    <i class="fab fa-whatsapp"></i> ENTRAR NO GRUPO VIP
                </a>
            </div>
        </div>
        
        <div class="termo-etica">
            <i class="fas fa-balance-scale"></i> Conforme Resolução CFN nº 856/2026. Ferramenta educativa, não substitui consulta nutricional individualizada.
        </div>
        
        <button class="btn-voltar" id="backBtn">
            <i class="fas fa-arrow-left"></i> Voltar ao início
        </button>
    </div>
`;
            document.getElementById('reportContainer').innerHTML = html;
            
            // Evento do botão voltar
            const backBtn = document.getElementById('backBtn');
            if(backBtn) {
                backBtn.addEventListener('click', () => {
                    window.location.href = 'quiza.html';
                });
            }
            
            // Tracking de conversão (simulado)
            setTimeout(() => {
                console.log(`🎯 PIXEL DE CONVERSÃO - Perfil: ${perfil.titulo} | Nome: ${primeiroNome} | Telefone: ${userData.telefone}`);
            }, 1000);
        }
        
        function showError(message) {
            document.getElementById('reportContainer').innerHTML = `
                <div class="report-card" style="text-align: center;">
                    <i class="fas fa-exclamation-triangle" style="font-size: 48px; color: var(--orange-warning); margin-bottom: 16px;"></i>
                    <h2>Ops! Dados não encontrados</h2>
                    <p style="margin: 16px 0;">${message || 'Você precisa fazer o quiz primeiro para acessar seu diagnóstico personalizado.'}</p>
                    <a href="quiza.html" class="btn-downsell" style="display: inline-block; margin-top: 20px; text-decoration: none;">FAZER O TESTE AGORA →</a>
                </div>
            `;
        }
        
        // ============================================
        // RECUPERAR DADOS DO sessionStorage (SEGURO)
        // ============================================
        function loadDataAndRender() {
            const storedData = sessionStorage.getItem(SESSION_KEY);
            
            if (!storedData) {
                showError('Nenhum dado encontrado. Por favor, realize o mapeamento alimentar primeiro.');
                return;
            }
            
            try {
                const userData = JSON.parse(storedData);
                
                // Validação básica dos dados
                if (!userData.nome || !userData.telefone || !userData.email) {
                    showError('Dados incompletos. Por favor, realize o mapeamento alimentar novamente.');
                    return;
                }
                
                // Renderizar o relatório
                renderReport(userData);
                
                // Opcional: limpar sessionStorage após usar para não acumular?
                // Comentado porque o usuário pode querer recarregar a página e ver o resultado novamente
                // sessionStorage.removeItem(SESSION_KEY);
                
            } catch (error) {
                console.error('Erro ao processar dados:', error);
                showError('Erro ao carregar seus dados. Por favor, tente novamente.');
            }
        }
        
        // Executar ao carregar a página
        loadDataAndRender();
    })();
</script>
</body>
</html>
